name: Publish to PyPI

# Manually triggered release workflow. A run targets exactly one index:
#
# - test_pypi = true: rehearsal. The version is suffixed with .dev{run_number}
#   and published to TestPyPI only. No commit, tag, or release is created, so
#   rehearsals are repeatable and never consume the real version number.
# - test_pypi = false: real release. The version is written to pyproject.toml
#   and published to PyPI FIRST; the commit, tag, and GitHub release happen
#   only after a successful upload, so a failed publish leaves the repository
#   untouched and the same version can be retried.
#
# Requires Trusted Publisher bindings on PyPI and TestPyPI pointing at this
# repository, this workflow file, and the pypi / testpypi environments.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z, no v prefix)"
        required: true
        type: string
      test_pypi:
        description: "Rehearsal: publish to TestPyPI only (no tag or release)"
        required: false
        type: boolean
        default: false

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: ${{ inputs.test_pypi && 'testpypi' || 'pypi' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Fail if not run from main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "This workflow must be run from the main branch (got ${{ github.ref }})."
          exit 1

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version '$VERSION' is not a plain X.Y.Z semver string."
            exit 1
          fi

      # The deploy key lets the version-bump commit and tag bypass the main
      # branch ruleset: add "Deploy keys" to the ruleset bypass list and store
      # the private key as the DEPLOY_KEY secret. checkout configures the
      # origin remote to use this key for the later push.
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set package version
        env:
          VERSION: ${{ inputs.version }}
          TEST_PYPI: ${{ inputs.test_pypi }}
        run: |
          if [ "$TEST_PYPI" = "true" ]; then
            EFFECTIVE_VERSION="${VERSION}.dev${{ github.run_number }}"
          else
            EFFECTIVE_VERSION="$VERSION"
          fi
          sed -i "s/^version = \".*\"/version = \"${EFFECTIVE_VERSION}\"/" pyproject.toml
          echo "EFFECTIVE_VERSION=${EFFECTIVE_VERSION}" >> "$GITHUB_ENV"
          grep '^version' pyproject.toml

      - name: Build distributions
        run: |
          pip install build
          python -m build

      - name: Publish to TestPyPI
        if: inputs.test_pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ !inputs.test_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1

      # Repository mutations happen only after a successful PyPI upload, so a
      # failed publish leaves main untouched and the version retryable.
      - name: Commit version bump and tag
        if: ${{ !inputs.test_pypi }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Release v${VERSION}"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"

      - name: Create GitHub release
        if: ${{ !inputs.test_pypi }}
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
