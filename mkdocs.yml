site_name: featurely
site_description: Reusable feature engineering utilities for tabular machine learning
repo_url: https://github.com/gperdrizet/featurely
repo_name: gperdrizet/featurely

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - API reference:
      - Pipeline evaluation: api/pipeline.md
      - EDA: api/eda.md
      - Outliers: api/outliers.md
      - Transforms: api/transforms.md
      - Scans: api/scans.md
      - Geo features: api/geo.md
      - Aggregate features: api/aggregate.md
      - Cluster features: api/cluster.md
      - Smoothing: api/smoothing.md
      - Decomposition: api/decomposition.md
      - Diagnostics: api/diagnostics.md
